site_name: Thinking in English Handbook
site_description: A practical Hindi to Natural Spoken English handbook — learn how native speakers actually talk.
site_url: https://thinking-in-english-handbook.pages.dev/
docs_dir: docs
site_dir: site
use_directory_urls: true
strict: true

theme:
  name: material
  language: en
  favicon: assets/favicon.png
  icon:
    logo: material/book-open-page-variant
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - navigation.sections
    - toc.follow
    - content.code.copy
    - search.highlight
    - search.share
    - search.suggest
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: Fira Code

plugins:
  - search
  - thinking-handbook

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

extra:
  analytics:
    provider: google
    property: G-VVSVT5ZME7
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/therealdumbprogrammer
      name: GitHub

copyright: "&copy; 2024–2026 ThinkEnglish by Vivek. All rights reserved."

extra_css:
  - assets/extra.css

nav:
  - Home: index.md
  - Contact: contact.md
