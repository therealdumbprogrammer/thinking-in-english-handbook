site_name: Thinking in English Handbook
site_description: A Hindi to Natural Spoken English handbook.
site_url: https://therealdumbprogrammer.github.io/thinking-in-english-handbook/
repo_url: https://github.com/therealdumbprogrammer/thinking-in-english-handbook
docs_dir: docs
site_dir: site
use_directory_urls: true
strict: true

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - content.code.copy
    - search.highlight
    - search.share
    - search.suggest
  palette:
    - scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - thinking-handbook

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - toc:
      permalink: true
